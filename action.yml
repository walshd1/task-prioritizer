name: 'Task Prioritizer'
description: 'Prioritizes tasks in a project board based on urgency, impact, and dependencies identified in issues.'
author: 'walshd1'
branding:
  icon: 'zap'
  color: 'blue'
inputs:
  gemini_api_key:
    description: 'Gemini API key (free)'
    required: false
  service_token:
    description: 'Service token (paid)'
    required: false
outputs:
  result:
    description: 'Result'
runs:
  using: 'node20'
  main: 'dist/index.js'
